Expanded context:
  - Precision fermentatation cell factories:
    tag: tag88256395
    src: https://en.wikipedia.org/wiki/Precision_fermentation#Cell_factories
    context: 
      A cell factory is a biological system (microorganisms, plant cells, or mammalian cells) that transform substrates into high-value biological products, such as proteins, enzymes, vitamins, pharmaceuticals and biomaterials under controlled conditions.[8][9] Microbial strains commonly used include Bacillus subtilis, Corynebacterium glutamicum, Escherichia coli, Komagataella phaffii, Saccharomyces cerevisiae, and Yarrowia lipolytica. Each of these hosts possesses unique genetic and metabolic characteristics that make them suitable for defined production purposes in precision fermentation. The selection of a microbial host is based on various factors, including the presence of native biosynthetic pathways for the desired product, the capacity for efficient expression of heterologous pathways, the safety profile of the organism, and its compatibility with different cultivation conditions.[10]
